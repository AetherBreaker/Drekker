[project]
name = "drekker"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Jacob Ogden", email = "jacob.ogden@yahoo.com" }
]
requires-python = ">=3.14"
dependencies = [
    "aiologic>=0.16.0",
    "debugpy>=1.8.20",
    "pandas-stubs>=3.0.0.260204",
    "pandas[performance]>=3.0.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
    "python-dateutil>=2.9.0.post0",
    "rapidfuzz>=3.14.3",
    "rich-pixels>=3.0.1",
    "textual-autocomplete>=4.0.6",
    "textual-coloromatic>=1.0.0",
    "textual-colorpicker>=0.1.0",
    "textual-dev>=1.8.0",
    "textual-filedrop>=0.1",
    "textual-fspicker>=1.0.0",
    "textual-image[textual]>=0.8.5",
    "textual-pdf>=0.1.7",
    "textual-pyfiglet>=1.0.0",
    "textual-serve>=1.1.3",
    "textual-slidecontainer>=0.6.0",
    "textual-slider>=0.2.0",
    "textual-tags>=0.3.3",
    "textual-timepiece>=0.7.0",
    "textual-transitions>=0.0.3",
    "textual-window>=0.7.0",
    "textual[syntax]>=8.1.1",
    "types-python-dateutil>=2.9.0.20260323",
    "uvloop>=0.22.1 ; sys_platform == 'linux'",
    "winloop>=0.6.0 ; sys_platform == 'win32'",
]

[project.scripts]
drekker = "drekker.__main__:main"

[build-system]
requires = ["uv_build>=0.11.1,<0.12.0"]
build-backend = "uv_build"

